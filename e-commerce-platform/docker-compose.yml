services:
  # API Gateway
  gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - order-service
      - payment-service
    networks:
      - ecommerce-network

  # Frontend
  frontend-web:
    build:
      context: ../e-commerce-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - ecommerce-network

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DB_HOST=auth-db
      - DB_USER=root
      - DB_PASSWORD=${AUTH_DB_PASSWORD:-auth123}
      - DB_NAME=auth_db
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - ecommerce-network

  auth-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${AUTH_DB_PASSWORD:-auth123}
      - MYSQL_DATABASE=auth_db
    volumes:
      - auth-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Product Service
  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DB_HOST=product-db
      - DB_USER=root
      - DB_PASSWORD=${PRODUCT_DB_PASSWORD:-product123}
      - DB_NAME=product_db
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - ecommerce-network

  product-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${PRODUCT_DB_PASSWORD:-product123}
      - MYSQL_DATABASE=product_db
    volumes:
      - product-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Cart Service
  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DB_HOST=cart-db
      - DB_USER=root
      - DB_PASSWORD=${CART_DB_PASSWORD:-cart123}
      - DB_NAME=cart_db
      - PRODUCT_SERVICE_URL=http://product-service:8002
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    depends_on:
      cart-db:
        condition: service_healthy
    networks:
      - ecommerce-network

  cart-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${CART_DB_PASSWORD:-cart123}
      - MYSQL_DATABASE=cart_db
    volumes:
      - cart-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DB_HOST=order-db
      - DB_USER=root
      - DB_PASSWORD=${ORDER_DB_PASSWORD:-order123}
      - DB_NAME=order_db
      - CART_DB_HOST=cart-db
      - CART_DB_USER=root
      - CART_DB_PASSWORD=${CART_DB_PASSWORD:-cart123}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - PRODUCT_SERVICE_URL=http://product-service:8002
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - ecommerce-network

  order-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${ORDER_DB_PASSWORD:-order123}
      - MYSQL_DATABASE=order_db
    volumes:
      - order-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - DB_HOST=payment-db
      - DB_USER=root
      - DB_PASSWORD=${PAYMENT_DB_PASSWORD:-payment123}
      - DB_NAME=payment_db
      - STRIPE_API_KEY=${STRIPE_API_KEY:-sk_test_placeholder}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - ORDER_SERVICE_URL=http://order-service:8004/api
    depends_on:
      payment-db:
        condition: service_healthy
    networks:
      - ecommerce-network

  payment-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${PAYMENT_DB_PASSWORD:-payment123}
      - MYSQL_DATABASE=payment_db
    volumes:
      - payment-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  auth-db-data:
  product-db-data:
  cart-db-data:
  order-db-data:
  payment-db-data:
