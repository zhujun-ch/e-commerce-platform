# Fly.io 配置文件
app = "ecommerce-platform"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile.multi"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[http_service.concurrency]
  type = "connections"
  hard_limit = 25
  soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  count = 1

# 持久化存储 (SQLite 数据库)
[[mount]]
  source = "ecommerce_data"
  destination = "/data"

[health_check]
  interval = 10
  timeout = 5
  path = "/health"
